# Nixpacks config for Railway deploys.
# Pins Python to 3.11 (stable, well-supported by all libs in
# requirements.txt). Local venv is Python 3.9; the code is
# 3.9-compatible and forward-compatible via __future__ annotations.

providers = ["python"]

[variables]
PYTHON_VERSION = "3.11"
NIXPACKS_PYTHON_VERSION = "3.11"
